<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="content-language" content="en-us">
  <title>Troop 70 Huntsville, AL</title>
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Roboto:n,b,bi">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      font-family: 'Roboto', sans-serif;
    }

    .banner-section {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .cd-section {
      background-image: url("https://raw.githubusercontent.com/EpicGroover/troop70-assets/main/images/20260613%20-%20Troop%20Photo.jpg");
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: scroll;
      background-size: cover;
      width: 100%;
      height: 530px;
      position: relative;
    }

    .image-logo2 {
      width: 130px;
      height: 140px;
      position: absolute;
      top: 11%;
      left: 3%;
      transform: translate(-50%, -50%);
    }

    /* Tablets */
    @media only screen and (max-width: 1024px) {
      .cd-section {
        height: 400px;
      }

      .image-logo2 {
        width: 100px;
        height: 110px;
        top: 10%;
        left: 10%;
      }
    }

    /* Mobile */
    @media only screen and (max-width: 768px) {
      .cd-section {
        height: 265px;
      }

      .image-logo2 {
        width: 80px;
        height: 90px;
        top: 10%;
        left: 10%;
      }
    }

    /* Portrait */
    @media (max-width: 768px) and (orientation: portrait) {
      .image-logo2 {
        top: 8%;
        left: 15%;
      }
    }

    /* Very small screens */
    @media only screen and (max-width: 381px) {
      .cd-section {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="banner-section">
    <div class="cd-section" id="banner-image">
      <img alt="Troop 70 Logo" class="image-logo2" id="image-logo-new" src="https://troopwebhost.blob.core.windows.net/troop70huntsville/troop70_logo_small_white_v2_202521610514376959004.png" />
    </div>
  </div>
  <script>
    (function () {
      var inIframe = window.self !== window.top;
      if (inIframe) {
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      }
      function sendHeight() {
        if (inIframe) {
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
        }
        var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
        if (inIframe) {
          document.documentElement.style.overflow = 'hidden';
          document.body.style.overflow = 'hidden';
        }
        window.parent.postMessage({ type: 'twh-resize', height: h }, '*');
      }
      window.addEventListener('load', function () { setTimeout(sendHeight, 100); });
      window.addEventListener('orientationchange', function () { setTimeout(sendHeight, 400); });
    })();
  </script>
</body>

</html>
