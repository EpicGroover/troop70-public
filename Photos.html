<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Albums</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    .photos-section {
      width: 2000px;
      max-width: 100%;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      padding: 28px 32px;
    }

    .photos-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .photos-heading h2 {
      color: #0A5F3E;
      font-size: 1.6em;
      font-weight: bold;
      margin: 0;
    }

    .photos-heading i {
      color: #0A5F3E;
      font-size: 1.6em;
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .album-card {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
      position: relative;
      aspect-ratio: 4 / 3;
    }

    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .album-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.18) 55%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }

    .album-date {
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
    }

    .album-date i {
      margin-right: 5px;
    }

    .album-title {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      margin: 0 0 14px;
    }

    .album-btn {
      display: inline-block;
      background: #FFB800;
      color: #222;
      padding: 7px 16px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      align-self: flex-start;
      transition: background 0.15s;
    }

    .album-btn:hover {
      background: #e6a600;
    }

    .album-btn i {
      margin-right: 6px;
    }

    @media (max-width: 768px) {
      .photos-section {
        padding: 20px 16px;
      }

      .photos-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="photos-section">

    <div class="photos-heading">
      <i class="fas fa-camera"></i>
      <h2>Photo Albums</h2>
    </div>

    <!--WEBMASTER START: ALBUM MODIFICATION-->

    <div class="photos-grid">

      <!--ALBUM START-->
      <div class="album-card">
        <img src="https://epicgroover.github.io/troop70-public/images/albums/2026-summer-camp.jpg" alt="Summer Camp 2026">
        <div class="album-card-overlay">
          <div class="album-date"><i class="fas fa-calendar-days"></i>June 13, 2026</div>
          <div class="album-title">Summer Camp 2026</div>
          <a href="https://www.troopwebhost.org/FormDetail.aspx?Menu_Item_ID=45936&Form_ID=182&ID=1807&Stack=3" target="_top" class="album-btn"><i class="fas fa-images"></i>View Photos</a>
        </div>
      </div>
      <!--ALBUM END-->

    </div>

    <!--WEBMASTER END: ALBUM MODIFICATION-->

  </div>

  <script>
    (function () {
      var inIframe = window.self !== window.top;
      if (inIframe) {
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      }
      function sendHeight() {
        if (inIframe) {
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
        }
        var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
        if (inIframe) {
          document.documentElement.style.overflow = 'hidden';
          document.body.style.overflow = 'hidden';
        }
        window.parent.postMessage({ type: 'twh-resize', height: h }, '*');
      }
      window.addEventListener('load', function () { setTimeout(sendHeight, 100); });
      window.addEventListener('orientationchange', function () { setTimeout(sendHeight, 400); });
    })();
  </script>
</body>

</html>
